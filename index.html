<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zade's School Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a2e !important;
            color: #ffffff !important;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Header */
        .header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }
        .header p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        /* Navigation breadcrumb */
        .breadcrumb {
            padding: 12px 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            display: none;
        }
        .breadcrumb a {
            color: #00b4d8;
            text-decoration: none;
        }
        .breadcrumb span {
            margin: 0 6px;
        }
        /* Category list */
        .category-list {
            padding: 8px 12px;
        }
        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            margin-bottom: 2px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .category-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .category-item:active {
            background: rgba(255,255,255,0.12);
        }
        .category-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .category-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
        }
        .category-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .category-info .count {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
        .category-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }
        /* Topic list (subcategories) */
        .topic-list {
            padding: 8px 12px;
        }
        .topic-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 2px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .topic-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .topic-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topic-left span.topic-name {
            font-size: 15px;
            color: #fff;
        }
        .topic-count {
            font-size: 12px;
            color: #00b4d8;
        }
        /* Resource page */
        .resource-page {
            padding: 8px 12px;
        }
        .resource-page h2 {
            font-size: 20px;
            font-weight: 700;
            padding: 8px 4px 16px;
        }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            padding: 12px 4px 8px;
        }
        .resource-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            border-left: 3px solid #e74c3c;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .resource-card:hover {
            background: rgba(255,255,255,0.1);
        }
        .resource-card:active {
            transform: scale(0.98);
        }
        .resource-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .resource-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(231, 76, 60, 0.15);
            border-radius: 8px;
            flex-shrink: 0;
        }
        .resource-icon svg {
            width: 20px;
            height: 20px;
            fill: #e74c3c;
        }
        .resource-info {
            min-width: 0;
        }
        .resource-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .resource-info .source {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
        .resource-link-icon {
            color: rgba(255,255,255,0.3);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .resource-link-icon svg {
            width: 16px;
            height: 16px;
        }
        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            margin: 8px 12px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 8px;
            color: #00b4d8;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        /* Animations */
        .page-enter {
            animation: slideIn 0.25s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .page-back {
            animation: slideBack 0.25s ease-out;
        }
        @keyframes slideBack {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        /* Topic divider line */
        .topic-item .left-bar {
            width: 3px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            flex-shrink: 0;
        }
        /* Hide sections */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Main App Container -->

        <!-- Breadcrumb -->

                            ]

                            ]
                        },

                            resources: [

                            ]

                            resources: [

                            ]

                            ]
                        }
                    ]
                },
                {
                    id: "human_biology",
                    name: "Human Biology",
                    icon: "🫀",
                    topics: [
                        {

                            name: "Digestive System",
                            resources: [
                                { title: "Digestive System", source: "Slides", url: "https://drive.google.com/file/d/19skE2BLtyfckjrqIHG0y4YEmGMxXzxkY/view?usp=share_link" }

                            ]
                        },
                        {
                            id: "the_skin",
                            name: "The Skin",
                            resources: [
                                { title: "The Skin", source: "Slides", url: "https://drive.google.com/file/d/1ZkjuQiTX08dSU09cPDTtTvN5D5ujw1QI/view?usp=share_link" }
                            ]
                        },
                        {
                            id: "female_reproductive",
                            name: "Female Reproductive System",
                            resources: [
                                { title: "Female Reproductive System", source: "Slides", url: "https://drive.google.com/file/d/1ZkjuQiTX08dSU09cPDTtTvN5D5ujw1QI/view?usp=share_link" }
                            ]
                        },
                        {

                            name: "Male Reproductive System",
                            resources: [
                                { title: "Male Reproductive System", source: "Slides", url: "https://drive.google.com/file/d/1ZkjuQiTX08dSU09cPDTtTvN5D5ujw1QI/view?usp=share_link" }
                            ]
                        },
                        {
                            id: "fertilization_embryology",
                            name: "Fertilization, Embryology & Fetal Development",
                            resources: [
                                { title: "Fertilization, Embryology & Fetal Development", source: "Slides", url: "https://drive.google.com/file/d/18uX03Q46Tt9IECeXnqoDKz0kE5xRGYwz/view?usp=sharing" }
                            ]
                        },
                        {

                            name: "The Blood and Its Types, Blood Vessels",
                            resources: [

                            ]

                            name: "Circulatory System",
                            resources: [

                            ]
                        },
                        {
                            id: "respiratory_system",
                            name: "Respiratory System",
                            resources: [

                            ]
                        },
                        {
                            id: "nervous_system",
                            name: "Nervous System",
                            resources: [
                                { title: "Nervous System", source: "Slides", url: "https://drive.google.com/file/d/1BQWDtzT2v_0xxMBWYL3JwrcC1WLYIaH1/view?usp=share_link" }
                            ]
                        },
                        {
                            id: "endocrine_system",
                            name: "Endocrine System",
                            resources: [
                                { title: "Endocrine System", source: "Slides", url: "https://drive.google.com/file/d/1g1wYMc6-bGG3b5OoXsJFmxn-9qq_C5h2/view?usp=share_link" }
                            ]
                        }
                    ]
                }
            ]
        };
        // ============================================================
        // SVG ICONS
        // ============================================================
        const PDF_ICON = `<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h6v7h7v9H6z"/><path d="M8 15.5c0-.28.22-.5.5-.5h1c.28 0 .5.22.5.5v2c0 .28-.22.5-.5.5h-1c-.28 0-.5-.22-.5-.5v-2zm3-1c0-.28.22-.5.5-.5h1c.28 0 .5.22.5.5v3c0 .28-.22.5-.5.5h-1c-.28 0-.5-.22-.5-.5v-3zm3 .5c0-.28.22-.5.5-.5h1c.28 0 .5.22.5.5v1.5c0 .28-.22.5-.5.5h-1c-.28 0-.5-.22-.5-.5V15z"/></svg>`;
        const LINK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`;
        const BACK_ARROW = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
        const CHEVRON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
        // ============================================================
        // RENDERING
        // ============================================================
        const content = document.getElementById('content');
        const breadcrumb = document.getElementById('breadcrumb');
        let currentView = 'home';
        function renderHome() {
            currentView = 'home';
            breadcrumb.style.display = 'none';
            let html = '<div class="category-list page-enter">';
            DATA.categories.forEach(cat => {
                const count = cat.topics.reduce((sum, t) => sum + t.resources.length, 0);
                html += `
                    <div class="category-item" onclick="renderCategory('${cat.id}')">
                        <div class="category-left">
                            <div class="category-icon">${cat.icon}</div>
                            <div class="category-info">
                                <h3>${cat.name}</h3>
                                <div class="count">${count} resources</div>
                            </div>
                        </div>
                        <div class="category-arrow">${CHEVRON}</div>
                    </div>
                `;
            });
            html += '</div>';
            content.innerHTML = html;
            tg.BackButton.hide();
        }
        function renderCategory(catId) {
            currentView = 'category';
            const cat = DATA.categories.find(c => c.id === catId);
            if (!cat) return;
            breadcrumb.style.display = 'block';
            breadcrumb.innerHTML = `<a onclick="renderHome()">Home</a><span>›</span>${cat.name}`;
            let html = `<div class="topic-list page-enter">`;
            cat.topics.forEach(topic => {
                const count = topic.resources.length;
                html += `
                    <div class="topic-item" onclick="renderTopic('${catId}', '${topic.id}')">
                        <div class="topic-left">
                            <div class="left-bar"></div>
                            <span class="topic-name">${topic.name}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="topic-count">${count} resource${count > 1 ? 's' : ''}</span>
                            <span class="category-arrow">${CHEVRON}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            content.innerHTML = html;
            tg.BackButton.show();
            tg.BackButton.onClick(function handler() {
                tg.BackButton.offClick(handler);
                renderHome();
            });
        }
        function renderTopic(catId, topicId) {
            currentView = 'topic';
            const cat = DATA.categories.find(c => c.id === catId);
            if (!cat) return;
            const topic = cat.topics.find(t => t.id === topicId);
            if (!topic) return;
            breadcrumb.style.display = 'block';
            breadcrumb.innerHTML = `<a onclick="renderHome()">Home</a><span>›</span><a onclick="renderCategory('${catId}')">${cat.name}</a><span>›</span>${topic.name}`;
            let html = `<div class="resource-page page-enter">`;
            html += `<h2>${topic.name}</h2>`;
            html += `<div class="section-label">SLIDES</div>`;
            topic.resources.forEach(res => {
                if (res.url) {
                    html += `
                        <div class="resource-card" onclick="window.open('${res.url}', '_blank')">
                            <div class="resource-left">
                                <div class="resource-icon">${PDF_ICON}</div>
                                <div class="resource-info">
                                    <h4>${res.title}</h4>
                                    <div class="source">${res.source}</div>
                                </div>
                            </div>
                            <div class="resource-link-icon">${LINK_ICON}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="resource-card" style="opacity:0.5;border-left-color:#666;cursor:default;">
                            <div class="resource-left">
                                <div class="resource-icon" style="background:rgba(255,255,255,0.06);">${PDF_ICON}</div>
                                <div class="resource-info">
                                    <h4>${res.title}</h4>
                                    <div class="source">Link coming soon</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            html += '</div>';
            content.innerHTML = html;
            tg.BackButton.show();
            tg.BackButton.onClick(function handler() {
                tg.BackButton.offClick(handler);
                renderCategory(catId);
            });
        }
        // Start the app
        renderHome();
    </script>
</body>
</html>
